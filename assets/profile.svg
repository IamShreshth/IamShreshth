      .key-primary { fill: #7aa2f7; font-weight: bold; }
      .key-secondary { fill: #bb9af7; font-weight: 500; }
      .key-tertiary { fill: #b4f9f8; }
      .colon { fill: #89ddff; }
      .string { fill: #9ece6a; }
      .bracket { fill: #f7768e; font-weight: bold; }
      .comma { fill: #e0af68; }
